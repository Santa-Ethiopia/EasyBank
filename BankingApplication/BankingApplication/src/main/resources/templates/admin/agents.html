<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Manage Agents - EasyBank Website</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
  <div class="container">
    <a class="navbar-brand" href="#">EasyBank Website</a>
    <div class="navbar-nav ms-auto">
      <a th:href="@{/admin/dashboard}" class="btn btn-outline-light btn-sm me-2">Admin Dashboard</a>
      <a th:href="@{/dashboard}" class="btn btn-outline-light btn-sm me-2">Main Dashboard</a>
      <form th:action="@{/logout}" method="post">
        <button type="submit" class="btn btn-outline-light btn-sm">Logout</button>
      </form>
    </div>
  </div>
</nav>

<div class="container mt-4">
  <h2>Manage Agents</h2>
  <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
  <div th:if="${message}" class="alert alert-success" th:text="${message}"></div>

  <!-- Create Agent Form -->
  <div class="card mt-3">
    <div class="card-header">
      <h5>Create New Agent</h5>
    </div>
    <div class="card-body">
      <form th:action="@{/admin/agents}" th:object="${agentRequest}" method="post">
        <!-- Global form errors -->
        <div th:if="${#fields.hasErrors('*')}" class="alert alert-danger">
          <div th:each="err : ${#fields.errors('*')}" th:text="${err}"></div>
        </div>

        <div class="row">
          <div class="col-md-4">
            <div class="mb-3">
              <label class="form-label">Branch Name</label>
              <input type="text" class="form-control" th:field="*{branchName}" required>
              <div th:if="${#fields.hasErrors('branchName')}" class="text-danger small" th:errors="*{branchName}"></div>
            </div>
          </div>
          <div class="col-md-4">
            <div class="mb-3">
              <label class="form-label">Business Name</label>
              <input type="text" class="form-control" th:field="*{businessName}" required>
              <div th:if="${#fields.hasErrors('businessName')}" class="text-danger small" th:errors="*{businessName}"></div>
            </div>
          </div>
          <div class="col-md-4">
            <div class="mb-3">
              <label class="form-label">TIN</label>
              <input type="text" class="form-control" th:field="*{tin}" required>
              <div th:if="${#fields.hasErrors('tin')}" class="text-danger small" th:errors="*{tin}"></div>
            </div>
          </div>
        </div>
        <div class="row">
          <div class="col-md-6">
            <div class="mb-3">
              <label class="form-label">Username</label>
              <input type="text" class="form-control" th:field="*{username}" required>
              <div th:if="${#fields.hasErrors('username')}" class="text-danger small" th:errors="*{username}"></div>
            </div>
          </div>
          <div class="col-md-6">
            <div class="mb-3">
              <label class="form-label">Password</label>
              <input type="password" class="form-control" th:field="*{password}" required>
              <div th:if="${#fields.hasErrors('password')}" class="text-danger small" th:errors="*{password}"></div>
            </div>
          </div>
        </div>
        <button type="submit" class="btn btn-primary">Create Agent</button>
      </form>
    </div>
  </div>

  <!-- Agents List -->
  <div class="card mt-4">
    <div class="card-header">
      <h5>Agents List</h5>
    </div>
    <div class="card-body">
      <table class="table table-striped">
        <thead>
        <tr>
          <th>Business Name</th>
          <th>Branch</th>
          <th>TIN</th>
          <th>Balance</th>
          <th>Status</th>
          <th>Actions</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="agent : ${agents}">
          <td th:text="${agent.businessName}"></td>
          <td th:text="${agent.branchName}"></td>
          <td th:text="${agent.tin}"></td>
          <td th:text="${'$' + agent.agentBalance}"></td>
          <td>
            <span th:if="${agent.status.name() == 'ACTIVE'}" class="badge bg-success">Active</span>
            <span th:if="${agent.status.name() == 'INACTIVE'}" class="badge bg-danger">Inactive</span>
          </td>
          <td>
            <!-- Deposit Form -->
            <form th:action="@{/admin/agents/{agentId}/deposit(agentId=${agent.agentId})}" method="post" class="d-inline">
              <div class="input-group input-group-sm">
                <input type="number" step="0.01" name="amount" class="form-control" placeholder="Amount" style="width: 100px;" required>
                <button type="submit" class="btn btn-success btn-sm">Deposit</button>
              </div>
            </form>

            <!-- Activate/Deactivate -->
            <form th:action="@{/admin/agents/{agentId}/deactivate(agentId=${agent.agentId})}" method="post" class="d-inline" th:if="${agent.status.name() == 'ACTIVE'}">
              <button type="submit" class="btn btn-warning btn-sm ms-1">Deactivate</button>
            </form>
            <form th:action="@{/admin/agents/{agentId}/activate(agentId=${agent.agentId})}" method="post" class="d-inline" th:if="${agent.status.name() == 'INACTIVE'}">
              <button type="submit" class="btn btn-success btn-sm ms-1">Activate</button>
            </form>
          </td>
        </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
</body>
</html>
