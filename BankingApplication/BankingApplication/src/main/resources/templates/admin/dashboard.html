<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Admin Dashboard - EasyBank Website</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
  <div class="container">
    <a class="navbar-brand" href="#">EasyBank Website</a>
    <div class="navbar-nav ms-auto">
      <a th:href="@{/dashboard}" class="btn btn-outline-light btn-sm me-2">Main Dashboard</a>
      <form th:action="@{/logout}" method="post">
        <button type="submit" class="btn btn-outline-light btn-sm">Logout</button>
      </form>
    </div>
  </div>
</nav>

<div class="container mt-4">
  <h2>Admin Dashboard</h2>

  <div class="row mt-4">
    <!-- Agents Summary -->
    <div class="col-md-6">
      <div class="card">
        <div class="card-header bg-primary text-white">
          <h5 class="mb-0">Agents Management</h5>
        </div>
        <div class="card-body">
          <p>Total Agents: <span th:text="${agents.size()}">0</span></p>
          <a th:href="@{/admin/agents}" class="btn btn-primary">Manage Agents</a>
        </div>
      </div>
    </div>

    <!-- Customers Summary -->
    <div class="col-md-6">
      <div class="card">
        <div class="card-header bg-success text-white">
          <h5 class="mb-0">Customers Management</h5>
        </div>
        <div class="card-body">
          <p>Total Customers: <span th:text="${customers.size()}">0</span></p>
          <div th:each="customer : ${customers}" class="d-flex justify-content-between align-items-center mb-2">
            <span th:text="${customer.username}"></span>
            <div>
              <form th:action="@{/admin/customers/{userId}/deactivate(userId=${customer.userId})}" method="post" style="display: inline;">
                <button type="submit" class="btn btn-warning btn-sm" th:if="${customer.status.name() == 'ACTIVE'}">Deactivate</button>
              </form>
              <form th:action="@{/admin/customers/{userId}/activate(userId=${customer.userId})}" method="post" style="display: inline;">
                <button type="submit" class="btn btn-success btn-sm" th:if="${customer.status.name() == 'INACTIVE'}">Activate</button>
              </form>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
