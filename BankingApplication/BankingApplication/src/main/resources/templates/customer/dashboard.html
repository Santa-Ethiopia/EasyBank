<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Customer Dashboard - EasyBank Website</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
  <div class="container">
    <a class="navbar-brand" href="#">EasyBank Website</a>
    <div class="navbar-nav ms-auto">
      <a th:href="@{/customer/profile}" class="btn btn-outline-light btn-sm me-2">My Profile</a>
      <a th:href="@{/dashboard}" class="btn btn-outline-light btn-sm me-2">Main Dashboard</a>
      <form th:action="@{/logout}" method="post">
        <button type="submit" class="btn btn-outline-light btn-sm">Logout</button>
      </form>
    </div>
  </div>
</nav>

<div class="container mt-4">
  <h2>Customer Dashboard</h2>

  <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
  <div th:if="${message}" class="alert alert-success" th:text="${message}"></div>

  <!-- Accounts Summary -->
  <div class="card mt-3">
    <div class="card-header">
      <h5 class="mb-0">My Accounts</h5>
    </div>
    <div class="card-body">
      <div th:if="${accounts.empty}" class="alert alert-info">
        No accounts found. Please contact your agent.
      </div>
      <div th:each="account : ${accounts}" class="mb-3 p-3 border rounded">
        <div class="row">
          <div class="col-md-6">
            <h6 th:text="'Account: ' + ${account.accountNumber}"></h6>
            <p class="mb-1">Name: <span th:text="${account.firstName + ' ' + account.middleName}"></span></p>
            <p class="mb-1">Balance: <strong th:text="${'$' + account.accountBalance}"></strong></p>
            <p class="mb-1">Status:
              <span th:if="${account.status.name() == 'ACTIVE'}" class="badge bg-success">Active</span>
              <span th:if="${account.status.name() == 'PENDING'}" class="badge bg-warning">Pending</span>
              <span th:if="${account.status.name() == 'INACTIVE'}" class="badge bg-danger">Inactive</span>
            </p>
          </div>
          <div class="col-md-6 text-end">
            <a th:href="@{/customer/transactions(accountNumber=${account.accountNumber})}"
               class="btn btn-primary btn-sm">View Transactions</a>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Transfer Between Accounts -->
  <div class="card mt-4">
    <div class="card-header bg-info text-white">
      <h5 class="mb-0">Transfer Between Accounts</h5>
    </div>
    <div class="card-body">
      <form th:action="@{/customer/transfer}" th:object="${transferRequest}" method="post">
        <div th:if="${#fields.hasErrors('*')}" class="alert alert-danger">
          <div th:each="err : ${#fields.errors('*')}" th:text="${err}"></div>
        </div>
        <div class="row">
          <div class="col-md-4">
            <div class="mb-3">
              <label class="form-label">From Account</label>
              <select class="form-control" th:field="*{fromAccountNumber}" required>
                <option value="">Select Account</option>
                <option th:each="account : ${accounts}"
                        th:value="${account.accountNumber}"
                        th:text="${account.accountNumber + ' ($' + account.accountBalance + ')'}"></option>
              </select>
            </div>
          </div>
          <div class="col-md-4">
            <div class="mb-3">
              <label class="form-label">To Account Number</label>
              <input type="text" class="form-control" th:field="*{toAccountNumber}" required>
              <div th:if="${#fields.hasErrors('toAccountNumber')}" class="text-danger small" th:errors="*{toAccountNumber}"></div>
            </div>
          </div>
          <div class="col-md-4">
            <div class="mb-3">
              <label class="form-label">Amount</label>
              <input type="number" step="0.01" class="form-control" th:field="*{amount}" required>
              <div th:if="${#fields.hasErrors('amount')}" class="text-danger small" th:errors="*{amount}"></div>
            </div>
          </div>
        </div>
        <button type="submit" class="btn btn-info">Transfer Funds</button>
      </form>
    </div>
  </div>
</div>
</body>
</html>
