<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Transaction History - EasyBank Website</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
  <div class="container">
    <a class="navbar-brand" href="#">EasyBank Website</a>
    <div class="navbar-nav ms-auto">
      <a th:href="@{/customer/dashboard}" class="btn btn-outline-light btn-sm me-2">Dashboard</a>
      <a th:href="@{/dashboard}" class="btn btn-outline-light btn-sm me-2">Main Dashboard</a>
      <form th:action="@{/logout}" method="post">
        <button type="submit" class="btn btn-outline-light btn-sm">Logout</button>
      </form>
    </div>
  </div>
</nav>

<div class="container mt-4">
  <h2>Transaction History</h2>
  <p class="lead">Account: <strong th:text="${accountNumber}"></strong></p>

  <div class="card">
    <div class="card-header">
      <h5 class="mb-0">Transactions</h5>
    </div>
    <div class="card-body">
      <div th:if="${transactions.empty}" class="alert alert-info">
        No transactions found for this account.
      </div>
      <table th:if="${!transactions.empty}" class="table table-striped">
        <thead>
        <tr>
          <th>Date</th>
          <th>Type</th>
          <th>Amount</th>
          <th>Balance</th>
          <th>Performed By</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="transaction : ${transactions}">
          <td th:text="${#temporals.format(transaction.transactionDate, 'yyyy-MM-dd HH:mm')}"></td>
          <td>
            <span th:if="${transaction.transactionType.name() == 'DEPOSIT'}" class="badge bg-success">Deposit</span>
            <span th:if="${transaction.transactionType.name() == 'WITHDRAWAL'}" class="badge bg-warning">Withdrawal</span>
            <span th:if="${transaction.transactionType.name() == 'TRANSFER'}" class="badge bg-info">Transfer</span>
          </td>
          <td>
            <span th:if="${transaction.amount.compareTo(0) > 0}" class="text-success" th:text="'+$' + ${transaction.amount}"></span>
            <span th:if="${transaction.amount.compareTo(0) < 0}" class="text-danger" th:text="'$' + ${transaction.amount}"></span>
          </td>
          <td th:text="'$' + ${transaction.accountBalance}"></td>
          <td th:text="${transaction.performedBy}"></td>
        </tr>
        </tbody>
      </table>
    </div>
  </div>

  <div class="mt-3">
    <a th:href="@{/customer/dashboard}" class="btn btn-secondary">Back to Dashboard</a>
  </div>
</div>
</body>
</html>
